DESCRIPTION_INTRO=Verfügbare Regressionstest-Szenarien:
DESCRIPTION_SCENARIO_MODE_SAFE=Führt nur Tests mit geringem Risiko aus. Geeignet für schnelle Prüfungen ohne kritische Sonos Aktionen.
DESCRIPTION_SCENARIO_MODE_ALL=Führt alle aktiven Tests aus. Inaktive Tests werden übersprungen.
DESCRIPTION_SCENARIO_CATEGORY_STATUS=Führt nur Tests der Kategorie Status aus.
DESCRIPTION_SCENARIO_RISK_LOW=Führt nur Tests mit Risiko low aus.
DESCRIPTION_SCENARIO_RISK_MIDDLE=Führt nur Tests mit Risiko middle aus.
DESCRIPTION_SCENARIO_RISK_CRITICAL=Führt nur kritische Tests aus. Diese Tests können reale Sonos Aktionen auslösen.
DESCRIPTION_SCENARIO_RISK_LOW_MIDDLE=Führt Tests mit Risiko low und middle aus.
DESCRIPTION_SCENARIO_ALL_VERBOSE=Führt alle aktiven Tests mit ausführlicher Logausgabe aus.
DESCRIPTION_SCENARIO_ALL_TAIL_25=Führt alle aktiven Tests aus und übernimmt zusätzlich die letzten Sonos Logzeilen bei Fehlern.
DESCRIPTION_SCENARIO_ALL_NO_SONOS_BLOCKS=Führt alle aktiven Tests ohne Sonos Logblock-Auswertung aus.
DESCRIPTION_HINT_ZONE=Zone ist eine Einzelauswahl. Die gewählte Zone ersetzt in jeder Test-URL den Platzhalter RAUM.
DESCRIPTION_HINT_MEMBER=Member ist eine Mehrfachauswahl. Die gewählten Player werden als kommagetrennte Liste übergeben und ersetzen RAUM1 bzw. vorhandene Member-Parameter. Der Parameter member=all ist nicht zulässig.
DESCRIPTION_HINT_JSON=Zum Testen von Playlisten oder Radio Stationen bitte in der URL den Platzhalter SOURCE verwenden und im Feld PL/Radio dann die entsprechende Source eingeben.
DESCRIPTION_HINT_WARNING=Hinweis: Kritische Tests, Member-Tests, TTS-Tests und Funktions-Tests können reale Sonos Aktionen auslösen. Bitte nur mit geeigneten Testplayern ausführen.
