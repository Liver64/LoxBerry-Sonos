							$(function () {
								var $followWait = $("#follow_wait");
								var values = [0, 30, 60, 120, 180, 300];
								var rawValue = $followWait.val();
								var savedSeconds = parseInt(rawValue, 10);

								if (isNaN(savedSeconds)) {
									savedSeconds = 30;
								}

								var startIndex = values.indexOf(savedSeconds);
								if (startIndex === -1) {
									startIndex = 1; // default = 30 sec
								}

								$followWait.ionRangeSlider({
									skin: "big",
									grid: true,
									values: values,
									from: startIndex,

									prettify: function (value) {
										if (value === 0) {
											return "0 Sec.";
										}
										if (value < 60) {
											return value + " Sec.";
										}
										if (value === 60) {
											return "1 Min.";
										}
										return (value / 60) + " Min.";
									},

									onStart: function (data) {
										$followWait.val(data.from_value);
									},

									onChange: function (data) {
										$followWait.val(data.from_value);
									},

									onFinish: function (data) {
										$followWait.val(data.from_value);
									}
								});

								$followWait.hide();

							});
